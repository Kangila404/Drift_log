name: cd.drift_log.yml
on:
  push:
    branches:
      - 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: 3. 백엔드 이미지 build & push
        uses: docker/build-push-action@v6
        with:
          context: ./drift_log
          push: true
          tags: ${{secrets.DOCKERHUB_USERNAME}}/driftlog-backend:latest

      - name: 4. 프론트 이미지 build & push
        uses: docker/build-push-action@v6
        with:
          context: ./front
          push: true
          tags: ${{secrets.DOCKERHUB_USERNAME}}/driftlog-frontend:latest
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{secrets.GOOGLE_CLIENT_ID}}
            VITE_KAKAO_CLIENT_ID=${{secrets.KAKAO_CLIENT_ID}}

      - name: 5. EC2로 배포 파일 복사 (compose, nginx)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_SSH_KEY}}
          source: "docker-compose.prod.yml,Nginx/nginx.conf"
          target: "~/driftlog"


      - name: 6. EC2 SSH 접속 -> 배포
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_SSH_KEY}}
          envs: KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,KAKAO_REDIRECT_URI,GOOGLE_CLIENT_ID,DB_NAME,DB_USERNAME,DB_PASSWORD,DB_ROOT_PASSWORD,GRAFANA_PASSWORD
          script: |
            cd ~/driftlog
            cat > .env <<EOF
            KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
            KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
            KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            DB_NAME=${DB_NAME}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            DB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
            GRAFANA_PASSWORD=${GRAFANA_PASSWORD}
            EOF
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d
            sudo docker image prune -f