spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 1800000
    refresh-token-expiration: 31536000000

  weather:
    api:
      key: ${WEATHER_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  metrics:
    tags:
      application: drift_log