spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

    jpa:
      hibernate:
        ddl-auto: create-drop

    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration: 1800000 # 30분
      refresh-token-expiration: 604800000 # 7일